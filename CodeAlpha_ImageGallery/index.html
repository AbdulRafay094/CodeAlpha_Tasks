<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Gallery</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Visual Gallery</h1>
  <p>Click any image to open the lightbox — use arrow keys or buttons to browse</p>
</header>

<div class="filters" id="filters">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="nature">Nature</button>
  <button class="filter-btn" data-filter="city">City</button>
  <button class="filter-btn" data-filter="animals">Animals</button>
  <button class="filter-btn" data-filter="people">People</button>
</div>

<div class="gallery" id="gallery"></div>

<div class="lightbox" id="lightbox">
  <div class="lightbox-content">
    <div class="lightbox-counter" id="lightboxCounter">1 / 12</div>
    <button class="lightbox-close" id="lightboxClose">&times;</button>
    <button class="lightbox-nav prev" id="lightboxPrev">&#10094;</button>
    <img id="lightboxImg" src="" alt="">
    <button class="lightbox-nav next" id="lightboxNext">&#10095;</button>
    <div class="lightbox-caption" id="lightboxCaption"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
