<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="calc" aria-label="Calculator">

    <div class="tape">
      <div class="tape-line history" id="history">0</div>
      <div class="tape-line display" id="display">0</div>
    </div>

    <div class="keys">
      <button class="key key--func" data-action="clear">AC</button>
      <button class="key key--func" data-action="negate">±</button>
      <button class="key key--func" data-action="percent">%</button>
      <button class="key key--op" data-action="op" data-value="÷">÷</button>

      <button class="key" data-action="num" data-value="7">7</button>
      <button class="key" data-action="num" data-value="8">8</button>
      <button class="key" data-action="num" data-value="9">9</button>
      <button class="key key--op" data-action="op" data-value="×">×</button>

      <button class="key" data-action="num" data-value="4">4</button>
      <button class="key" data-action="num" data-value="5">5</button>
      <button class="key" data-action="num" data-value="6">6</button>
      <button class="key key--op" data-action="op" data-value="−">−</button>

      <button class="key" data-action="num" data-value="1">1</button>
      <button class="key" data-action="num" data-value="2">2</button>
      <button class="key" data-action="num" data-value="3">3</button>
      <button class="key key--op" data-action="op" data-value="+">+</button>

      <button class="key key--wide" data-action="num" data-value="0">0</button>
      <button class="key" data-action="decimal">.</button>
      <button class="key key--equal" data-action="equals">=</button>
    </div>

    <p class="hint">Keyboard ready — numbers, + − * /, Enter, Backspace, Esc</p>

  </main>

<script src="script.js"></script>
</body>
</html>
